name: LinkedIn Job Scraper

on:
  schedule:
    # Ejecutar todos los días a las 09:00 UTC (05:00 AM hora de Chile aprox)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde la interfaz de GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requerido para hacer commit y push de revisado.json

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install requests beautifulsoup4 google-genai python-dotenv
        fi

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_REMITENTE: ${{ secrets.EMAIL_REMITENTE }}
        EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: python hunter.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Scraper"
        git config --global user.email "actions@github.com"
        git add revisado.json
        # Solo hacer commit y push si hay cambios en el archivo
        if git diff --staged --quiet; then
          echo "No hay nuevas ofertas revisadas para commitear."
        else
          git commit -m "Auto-update: ofertas revisadas [skip ci]"
          git push
        fi
